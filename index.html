function decodeLeads(tuples){
  return tuples.map(t=>{
    const [id,name,source,received,phone,email,sms,call,type,outcome,ttfc,issuesStr,dupStr,dupPriority,eventsStr] = t;
    const issues = issuesStr ? issuesStr.split(',') : [];
    const dup = dupStr ? dupStr.split(',').map(x=>'L-'+x) : [];
    const events = eventsStr ? eventsStr.split(';').map(es=>{
      const [ch,status,agent,offset] = es.split('|');
      return { ch: ch==='c'?'call':'sms', status, agent:'AGT-'+agent, offsetMin: parseInt(offset,10) };
    }) : [];
    return { id:'L-'+id, name, source, received, phone, email: email||null, smsConsent: sms===1?true:(sms===0?false:null), callConsent: call===1, type: type==='b'?'buyer':'seller', outcome, ttfc, issues, dup, dupPriority: dupPriority||null, events };
  });
}

function decodeAttempts(tuples, leadsById){
  return tuples.map(t=>{
    const [aid,lid,ch,at,statusCode,agent] = t;
    const lead = leadsById['L-'+lid];
    return { attemptId:'A-'+aid, leadId:'L-'+lid, leadName: lead?lead.name:'?', source: lead?lead.source:'?', channel: ch==='c'?'call':'sms', at, status: STATUS_MAP[statusCode]||statusCode, agent:'AGT-'+agent };
  });
}

let resultsFilter = 'all';
let leadsOriginTab = 'results-macro';
let resultsSort = { col: 'name', dir: 1 };
const resolvedAlerts = new Set();
let outreachSort = { col: 'at', dir: 1 };
let sourcesSort = { col: 'total', dir: -1 };
let agentsSort = { col: 'attempts', dir: -1 };
let resultsPage = 0;
let resultsSearch = '';
const RESULTS_PAGE_SIZE = 15;

function setResultsFilter(f){
  leadsOriginTab = 'results-macro'; resultsFilter = f; resultsPage = 0; renderResults(); }
function resultsGoToPage(p){ resultsPage = p; renderResults(); }
function setResultsSearch(v){ resultsSearch = v.trim().toLowerCase(); resultsPage = 0; renderResults(); }

function setResultsSort(col){
  if(resultsSort.col === col) resultsSort.dir *= -1;
  else { resultsSort.col = col; resultsSort.dir = 1; }
  resultsPage = 0;
  renderResults();
}

function getSortedLeads(list){
  const {col, dir} = resultsSort;
  return [...list].sort((a,b)=>{
    let av, bv;
    if(col==='name') { av=a.name; bv=b.name; }
    else if(col==='source') { av=a.source; bv=b.source; }
    else if(col==='ttfc') { av=a.ttfc??9999; bv=b.ttfc??9999; }
    else if(col==='outcome') { av=a.outcome; bv=b.outcome; }
    else if(col==='issues') { av=a.issues.length; bv=b.issues.length; }
    else { av=a.name; bv=b.name; }
    if(typeof av==='string') return av.localeCompare(bv)*dir;
    return (av-bv)*dir;
  });
}

function getFilteredLeads(){
  let list = LEADS;
  if(resultsFilter === 'completed') list = list.filter(l => l.outcome === 'completed');
  else if(resultsFilter === 'issues') list = list.filter(l => l.issues.length > 0);
  else if(resultsFilter === 'clean') list = list.filter(l => l.issues.length === 0);
  else if(resultsFilter.startsWith('issue:')) { const k = resultsFilter.slice(6); list = list.filter(l => l.issues.includes(k)); }
  if(resultsSearch){
    list = list.filter(l => l.id.toLowerCase().includes(resultsSearch) || l.name.toLowerCase().includes(resultsSearch) || l.source.toLowerCase().includes(resultsSearch));
  }
  return getSortedLeads(list);
}

function renderResults(){
  const filtered = getFilteredLeads();
  const totalPages = Math.max(1, Math.ceil(filtered.length / RESULTS_PAGE_SIZE));
  if(resultsPage >= totalPages) resultsPage = totalPages - 1;
  const pageItems = filtered.slice(resultsPage*RESULTS_PAGE_SIZE, (resultsPage+1)*RESULTS_PAGE_SIZE);

  const completedCount = LEADS.filter(l=>l.outcome==='completed').length;
  const issueCount = LEADS.filter(l=>l.issues.length>0).length;
  const cleanCount = LEADS.filter(l=>l.issues.length===0).length;
  const filterLabel = resultsFilter.startsWith('issue:') ? ISSUE_LABELS[resultsFilter.slice(6)] : null;

  let html = `<p style="color:var(--color-text-secondary);font-size:13px;margin:0 0 10px;">All ${LEADS.length} leads from leads.csv, fully computed \u2014 not a sample. Click a row for full detail and timeline.</p>
  <input class="ljt-search" placeholder="Search by lead ID, name, or source" value="${resultsSearch}" oninput="setResultsSearch(this.value)">
  <div class="ljt-filter-pills">
    <span class="ljt-pill ${resultsFilter==='all'?'active':''}" onclick="setResultsFilter('all')">All (${LEADS.length})</span>

    <span class="ljt-pill ${resultsFilter==='clean'?'active':''}" onclick="setResultsFilter('clean')">No issue (${cleanCount})</span>
    <span style="color:var(--color-text-tertiary);font-size:11px;align-self:center;margin:0 2px;">|</span>
    <span class="ljt-pill ${resultsFilter==='completed'?'active':''}" onclick="setResultsFilter('completed')">Completed (${completedCount})</span>
    ${filterLabel ? `<span class="ljt-pill active">${filterLabel} (${filtered.length})</span>` : ''}
  </div>
  <table class="ljt-table"><thead><tr>
    <th onclick="setResultsSort('name')" style="cursor:pointer;user-select:none;">Lead ${resultsSort.col==='name'?(resultsSort.dir===1?'↑':'↓'):'↕'}</th>
    <th onclick="setResultsSort('source')" style="cursor:pointer;user-select:none;">Source ${resultsSort.col==='source'?(resultsSort.dir===1?'↑':'↓'):'↕'}</th>
    <th onclick="setResultsSort('ttfc')" style="cursor:pointer;user-select:none;">Time to first contact ${resultsSort.col==='ttfc'?(resultsSort.dir===1?'↑':'↓'):'↕'}</th>
    <th onclick="setResultsSort('outcome')" style="cursor:pointer;user-select:none;">Outcome ${resultsSort.col==='outcome'?(resultsSort.dir===1?'↑':'↓'):'↕'}</th>
    <th onclick="setResultsSort('issues')" style="cursor:pointer;user-select:none;">Issues ${resultsSort.col==='issues'?(resultsSort.dir===1?'↑':'↓'):'↕'}</th>
  </tr></thead><tbody>`;
  if(pageItems.length === 0){
    html += `<tr><td colspan="5" style="text-align:center;color:var(--color-text-tertiary);padding:20px;">No leads match this filter.</td></tr>`;
  }
  pageItems.forEach(l=>{
    html+=`<tr class="clickable" onclick="showLead('${l.id}')">
      <td style="font-weight:500;">${l.name} <span style="color:var(--color-text-tertiary);font-weight:400;">(${l.id})</span></td>
      <td>${l.source}</td>
      <td>${fmtMin(l.ttfc)}</td>
      <td><span style="color:${OUTCOME_COLOR[l.outcome]};">${OUTCOME_LABEL[l.outcome]}</span></td>
      <td>${l.issues.length ? l.issues.map(i=>`<span class="ljt-badge ${sevClass(ISSUE_META[i].severity)}" style="margin-right:4px;">${ISSUE_META[i].label}</span>`).join('') : '<span style="color:var(--color-text-tertiary);">none</span>'}</td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  html += pagerHTML('results', resultsPage, totalPages, filtered.length, RESULTS_PAGE_SIZE);
  document.getElementById('panel-results-macro').innerHTML=html;
}
function resultsGoToPage(p){ resultsPage = p; renderResults(); }

function showLead(id){
  const l=LEADS.find(x=>x.id===id);
  if(!l) return;
  switchTab('lead-detail');
  const _origin = leadsOriginTab || 'results-macro';
  let html=`<span class="ljt-back" onclick="leadsOriginTab='results-macro';switchTab('${_origin}');">&larr; Back to ${_origin==='alerts'?'Alerts':'all leads'}</span>
  <div class="ljt-card">
    <p style="font-weight:500;font-size:16px;margin:0;">${l.name}</p>
    <p style="color:var(--color-text-secondary);font-size:13px;margin:2px 0 0;">${l.id} &middot; ${l.source} &middot; ${l.type}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-top:12px;">
      <div><span style="color:var(--color-text-secondary);">Phone</span><br>${l.phone}</div>
      <div><span style="color:var(--color-text-secondary);">Email</span><br>${l.email||'<span style="color:var(--color-text-danger);">missing</span>'}</div>
      <div><span style="color:var(--color-text-secondary);">SMS consent</span><br>${l.smsConsent===null?'<span style="color:var(--color-text-danger);">blank</span>':l.smsConsent?'yes':'no'}</div>
      <div><span style="color:var(--color-text-secondary);">Call consent</span><br>${l.callConsent?'yes':'no'}</div>
    </div>
  </div>`;
  if(l.issues.length){
    html+=`<div class="ljt-card"><p style="font-weight:500;margin:0 0 8px;">Flagged issues</p>`;
    l.issues.forEach(i=>{
      const meta = ISSUE_META[i];
      html+=`<div style="margin-bottom:10px;">
        <span class="ljt-badge ${sevClass(meta.severity)}">${meta.label}</span>
        <div class="ljt-meta-row">
          <span class="ljt-badge ${meta.automatable?'ljt-badge-auto':'ljt-badge-ext'}">${meta.automatable?'Internally automatable':'Needs external input'}</span>
          <span class="ljt-badge ljt-badge-ext">Suggested owner: ${meta.owner}</span>
        </div>
        <div class="ljt-why-fix" style="margin-top:6px;">
          <div class="ljt-why"><span style="font-weight:500;">Why:</span> ${meta.why}</div>
          <div class="ljt-fix"><span style="font-weight:500;">Fix:</span> ${meta.fix}</div>
        </div>
      </div>`;
    });
    if(l.dup.length) html+=`<p style="font-size:13px;margin-top:8px;">Duplicate of: ${l.dup.map(id=>`<a href="#" onclick="showLead('${id}');return false;" style="color:var(--color-text-info);">${id}</a>`).join(', ')}${l.dupPriority?` \u2014 this lead is the "${l.dupPriority}-received" record`:''}</p>`;
    html+=`</div>`;
  }
  html+=`<div class="ljt-card"><p style="font-weight:500;margin:0 0 8px;">Timeline</p>
    <div class="ljt-event"><div><span style="font-size:13px;font-weight:500;">Lead received</span><br><span style="font-size:12px;color:var(--color-text-secondary);">${fmtDate(l.received)} via ${l.source}</span></div></div>`;
  const recvMs = new Date(l.received).getTime();
  let prevOffsetMin = 0;
  l.events.forEach((e,i)=>{
    const absMs = recvMs + e.offsetMin * 60000;
    const absDate = new Date(absMs);
    const hopMin = e.offsetMin - prevOffsetMin;
    const pct = Math.min(100, Math.round(hopMin / Math.max(1, e.offsetMin) * 100));
    const barW = Math.min(120, Math.max(8, Math.round(hopMin / 5)));
    html+=`<div class="ljt-hop">
      <span class="ljt-hop-bar" style="width:${barW}px;"></span>
      <span class="ljt-hop-label">+${fmtMin(hopMin)}</span>
    </div>`;
    html+=`<div class="ljt-event"><div><span style="font-size:13px;font-weight:500;">${e.ch.toUpperCase()} &middot; ${e.status}</span><br><span style="font-size:12px;color:var(--color-text-secondary);">${absDate.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})} &middot; ${e.agent}</span></div></div>`;
    prevOffsetMin = e.offsetMin;
  });
  if(!l.events.length) html+=`<div class="ljt-event"><div><span style="font-size:13px;color:var(--color-text-danger);font-weight:500;">No outreach attempts ever recorded</span></div></div>`;
  html+=`</div>`;
  document.getElementById('panel-lead-detail').innerHTML=html;
}

let outreachPage = 0;
let outreachSearch = '';
const OUTREACH_PAGE_SIZE = 20;
function outreachGoToPage(p){ outreachPage = p; renderOutreach(); }
function setOutreachSearch(v){ outreachSearch = v.trim().toLowerCase(); outreachPage = 0; renderOutreach(); }

function setOutreachSort(col){
  if(outreachSort.col===col) outreachSort.dir*=-1; else { outreachSort.col=col; outreachSort.dir=1; }
  outreachPage=0; renderOutreach();
}
function sortOutreach(list){
  const {col,dir}=outreachSort;
  return [...list].sort((a,b)=>{
    let av,bv;
    if(col==='lead'){av=a.leadName;bv=b.leadName;}
    else if(col==='source'){av=a.source;bv=b.source;}
    else if(col==='channel'){av=a.channel;bv=b.channel;}
    else if(col==='status'){av=a.status;bv=b.status;}
    else if(col==='agent'){av=a.agent;bv=b.agent;}
    else{av=new Date(a.at).getTime();bv=new Date(b.at).getTime();}
    if(typeof av==='string') return av.localeCompare(bv)*dir;
    return (av-bv)*dir;
  });
}
function renderOutreach(){

function renderSources(){

  const maxT = Math.max(...hours.map(h=>hourData[h].t));

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-tertiary);">Finding 4</span>
      <span class="ljt-severity-dot" style="background:var(--color-text-info);"></span>
    </div>
    <p style="font-weight:600;font-size:15px;font-family:'Rubik',sans-serif;margin:0 0 6px;">10am first contact outlier — 11% completion</p>
    <p style="font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin:0 0 16px;">Every contact hour between 11am–10pm completes at 33–67%. Leads first contacted at 10am complete at 11% (1 of 9). Small sample, but a notable outlier worth monitoring as more data accumulates.</p>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr>
          <th style="text-align:left;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;padding:0 8px 8px 0;">Hour</th>
          <th style="text-align:right;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;padding:0 8px 8px 0;">Leads</th>
          <th style="padding:0 0 8px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;">Completion rate</th>
        </tr></thead>
        <tbody>`;

  hours.forEach(h => {
    const d = hourData[h];
    const rate = d.t ? Math.round(d.c/d.t*100) : 0;
    const barW = Math.round(rate * 1.2);
    const color = h===10 ? 'var(--color-text-danger)' : rate>=50 ? 'var(--color-text-success)' : 'var(--color-text-info)';
    const bg = h===10 ? 'var(--color-background-danger)' : 'transparent';
    html += `<tr style="border-top:1px solid var(--color-border);background:${bg};">
      <td style="padding:7px 8px 7px 0;font-weight:${h===10?'600':'400'};color:${h===10?'var(--color-text-danger)':'inherit'};">${h}:00</td>
      <td style="text-align:right;padding:7px 8px 7px 0;color:var(--color-text-secondary);">${d.t}</td>
      <td style="padding:7px 0;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:${barW}px;height:6px;background:${color};border-radius:3px;min-width:2px;"></div>
          <span style="font-weight:600;font-family:'Rubik',sans-serif;color:${color};">${rate}%</span>
        </div>
      </td>
    </tr>`;
  });

  html += `</tbody></table></div>
    <div style="background:var(--color-background-info);border-left:3px solid var(--color-text-info);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-top:10px;">
      <strong style="color:var(--color-text-primary);">Worth monitoring:</strong> 9 leads is too small to draw a conclusion. Flag it and revisit with 30 days of data — if 10am consistently underperforms, there's either an agent scheduling issue or a lead-type pattern worth investigating.
    </div>
  </div>`;

  html += `</div>`;
  document.getElementById('panel-bonus-macro').innerHTML = html;
}

renderResults();
renderOutreach();
renderSources();
renderAgents();
